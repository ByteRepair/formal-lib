name: Test

# Reusable test suite, called by ci.yml (push/PR) and by release.yml (as a
# prerequisite of publishing). Kept in one place so CI and the release gate
# always run the same checks.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-hatch
      - name: Run unit tests
        run: hatch test

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-hatch
      - name: Run regression tests
        run: hatch test -- tests/regressions/ -m regression -o "addopts="
