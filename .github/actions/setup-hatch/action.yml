name: Setup Hatch
description: Setup Python and install Hatch

inputs:
  python-version:
    description: Python version
    default: "3.12"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6.3.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
    - name: Install hatch
      run: pip install hatch
      shell: bash
